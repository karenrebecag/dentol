<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servicios | Dentol</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <!-- StyleSheets -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/Variables.css">
  <link rel="stylesheet" href="styles/Servicios.css">
  <link rel="stylesheet" href="styles/Buttons.css">
</head>

<body>

  <!-- ======= Header =======-->
  <header class="text-center py-4">
  </header>

  <!-- ======= Main ======= -->
  <main class="Services">
    <section class="MainBannerServices col-12">
      <div class="col-8">
        <h2  class="Heading" >Servicios</h2>
        <p  class="SubHeadingBold" >
          Ya sea que busques mejorar la estética, resolver una molestia o simplemente hacer un control, 
          estamos para ayudarte con compromiso, calidez y profesionalismo.
        </p>
        <p  class="SubHeading" >
          Todo lo que tu sonrisa necesita, en un solo lugar
        </p>
        <!-- Botones -->
        <div class="d-flex flex-column flex-md-row gap-3 gap-md-4">
          <button  class="NormalButton">
            Nuestros especialistas
          </button>    

          <button  class="WhatsAppButton">
            Agenda tu cita
            <div class="icon">
              <img src="assets/Icons/General/WhatsAppIcon.svg" alt="Icono WhatsApp" height="28px" width="28px">
            </div>
          </button>                      
        </div>
      </div>
    </section>

    <section id="ServiciosContainer" class="my-5"></section>

  </main>

  <footer class="text-center py-3">
    <p>Footer</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Componentss -->
  <script src="Components/Servicios.js"></script>

  <!-- Components INIT-->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initServiciosComponent('ServiciosContainer');
    });
  </script>

<!--AOS-->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();
  </script>

</body>
</html>
