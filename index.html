<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
    <title>Servicios Dentales en CDMX | Dentol Clínica Odontológica</title>
  
    <!-- Meta Descripción -->
    <meta name="description" content="Descubre todos los servicios odontológicos de Dentol: estética dental, endodoncia, ortodoncia, implantes, blanqueamiento, limpieza, y más. Atención cálida y profesional.">
  
    <!-- Meta Keywords -->
    <meta name="keywords" content="odontología, salud bucal, limpieza dental, caries, endodoncia, estética dental, implantes dentales, ortodoncia, clínica dental CDMX, Dentol, servicios dentales">
  
    <!-- Robots -->
    <meta name="robots" content="index, follow">
  
    <!-- Idioma -->
    <meta http-equiv="Content-Language" content="es">
  
    <!-- Open Graph (Facebook y otros) -->
    <meta property="og:title" content="Servicios Dentales en CDMX | Dentol Clínica Odontológica">
    <meta property="og:description" content="Consulta nuestros servicios dentales profesionales en Dentol: ortodoncia, blanqueamiento, endodoncia, implantes y más. Agenda tu cita.">
    <meta property="og:image" content="https://tudominio.com/assets/favicon/apple-touch-icon.png">
    <meta property="og:url" content="https://tudominio.com/servicios">
    <meta property="og:type" content="website">
  
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Servicios Dentales en CDMX | Dentol Clínica Odontológica">
    <meta name="twitter:description" content="Descubre los tratamientos dentales que ofrece Dentol: estética, ortodoncia, limpieza, endodoncia y más. Agenda hoy.">
    <meta name="twitter:image" content="https://tudominio.com/assets/favicon/apple-touch-icon.png">
  
    <!-- Canonical URL -->
    <link rel="canonical" href="https://tudominio.com/servicios">
  
    <!-- Favicon básico -->
    <link rel="icon" href="assets/favicon/favicon.ico" type="image/x-icon">
    <link rel="icon" href="assets/favicon/favicon.svg" type="image/svg+xml">
  
    <!-- PNG Favicons -->
    <link rel="icon" type="image/png" sizes="96x96" href="assets/favicon/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
  
    <!-- Android Web App icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon/web-app-manifest-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/favicon/web-app-manifest-512x512.png">
  
    <!-- Web Manifest -->
    <link rel="manifest" href="assets/favicon/site.webmanifest">
  
    <!-- Estilos y Frameworks -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <!-- Componentes -->
    <link rel="stylesheet" href="styles/Variables.css">
    <link rel="stylesheet" href="styles/Servicios.css">
    <link rel="stylesheet" href="styles/Buttons.css">
    <link rel="stylesheet" href="styles/Menu.css">
    <link rel="stylesheet" href="styles/Footer.css">
    <link rel="stylesheet" href="styles/WhatsAppButton.css">

  </head>

<body>


  <!-- ======= Main ======= -->
  <main class="Services">
    <section class="MainBannerServices col-12">
      <div class="col-8">
        <h2  class="Heading" >Servicios</h2>
        <p  class="SubHeadingBold" >
          Ya sea que busques mejorar la estética, resolver una molestia o simplemente hacer un control, 
          estamos para ayudarte con compromiso, calidez y profesionalismo.
        </p>
        <p  class="SubHeading" >
          Todo lo que tu sonrisa necesita, en un solo lugar
        </p>
        <!-- Botones -->
        <div class="d-flex flex-column flex-md-row gap-3 gap-md-4">
          <button  class="NormalButton">
            Nuestros especialistas
          </button>    

          <button  class="WhatsAppButton">
            Agenda tu cita
            <div class="icon">
              <img src="assets/Icons/General/WhatsAppIcon.svg" alt="Icono WhatsApp" height="28px" width="28px">
            </div>
          </button>                      
        </div>
      </div>
    </section>

    <section id="ServiciosContainer" class="my-5"></section>

  </main>


  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Componentss -->
  <script src="Components/Servicios.js"></script>
  <script src="Components/Footer.js" defer></script>
  <script src="Components/Menu.js"></script>
  <script src="Components/WhatsAppButton.js""></script>

  <!-- Components INIT-->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initServiciosComponent('ServiciosContainer');
    });
  </script>



</body>
</html>
